name: Pipeline Visualizer

on:
  workflow_run:
    workflows: [CI, Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  visualize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Generate pipeline visualization
        run: |
          pnpm exec tsx packages/cli/src/main.ts visualize .github/pipelines/pipeline.yml \
            --live \
            --output pipeline-visualization.html \
            --github-summary
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v7
        id: upload-viz
        with:
          name: pipeline-viz
          path: pipeline-visualization.html
          retention-days: 30

      - name: Append artifact URL to step summary
        if: steps.upload-viz.outputs.artifact-url != ''
        env:
          VIZ_URL: ${{ steps.upload-viz.outputs.artifact-url }}
        run: |
          echo "[📊 Download pipeline visualization]($VIZ_URL)" >> "$GITHUB_STEP_SUMMARY"
