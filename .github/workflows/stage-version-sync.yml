name: Version sync

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: Semver without v prefix
        value: ${{ jobs.version-sync.outputs.version }}
      skip_publish:
        description: True when master and tag already had synced version files
        value: ${{ jobs.version-sync.outputs.skip_publish }}
      commit_sha:
        description: Commit SHA after version sync (tag target)
        value: ${{ jobs.version-sync.outputs.commit_sha }}

permissions:
  contents: write
  actions: write

concurrency:
  group: stage-version-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-sync:
    name: Sync version files from tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.tag.outputs.version }}
      skip_publish: ${{ steps.git-state.outputs.skip_publish }}
      commit_sha: ${{ steps.resolve-head.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve tag version
        id: tag
        run: |
          ref="${GITHUB_REF}"
          if ! [[ "$ref" =~ ^refs/tags/v(.+)$ ]]; then
            echo "Expected refs/tags/vX.Y.Z, got $ref"
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: v${version}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag version: $version"

      - name: Sync version files
        run: bash scripts/ci/sync-versions-from-tag.sh "${{ steps.tag.outputs.version }}"

      - name: Require CHANGELOG section for release
        run: bash scripts/ci/require-changelog-section.sh "${{ steps.tag.outputs.version }}"

      - name: Detect git release state
        id: git-state
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch origin master "refs/tags/v${VERSION}"
          master_sha=$(git rev-parse origin/master)
          tag_sha=$(git rev-parse "refs/tags/v${VERSION}^{commit}" 2>/dev/null || echo "")
          if [ -z "$(git status --porcelain)" ] && [ -n "$tag_sha" ] && [ "$tag_sha" = "$master_sha" ]; then
            echo "Git release aligned: tag v${VERSION} at master with synced files."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Git release needs publish (version commit and/or retag)."
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish version sync to master
        if: steps.git-state.outputs.skip_publish != 'true'
        id: publish
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          DEFAULT_BRANCH: master
        run: bash scripts/ci/publish-version-sync.sh "${VERSION}"

      - name: Resolve release commit
        id: resolve-head
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch origin master "refs/tags/v${VERSION}"
          echo "commit_sha=$(git rev-parse "refs/tags/v${VERSION}^{commit}")" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6
        if: success()

      - uses: actions/setup-node@v6
        if: success()
        with:
          node-version: '24'
          cache: pnpm

      - name: Bundle export action
        if: success()
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @aeswibon/pipeline-compose-action-export run bundle

      - uses: ./packages/action-export
        if: success()
        with:
          stage_id: version-sync
          validate_schema: true
          context_schema_json: >-
            {"type":"object","properties":{"version-sync":{"type":"object","properties":{"version":{"type":"string","pattern":"^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?$"},"skip_publish":{"type":"string","enum":["true","false"]}}}}}
          outputs: >-
            {"version":"${{ steps.tag.outputs.version }}",
             "skip_publish":"${{ steps.git-state.outputs.skip_publish }}"}
