name: Version sync

on:
  workflow_call:
    outputs:
      version:
        description: Semver without v prefix
        value: ${{ jobs.version-sync.outputs.version }}
      skip_publish:
        description: True when master and tag already had synced version files
        value: ${{ jobs.version-sync.outputs.skip_publish }}

permissions:
  contents: write
  actions: write

concurrency:
  group: stage-version-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-sync:
    name: Sync version files from tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.tag.outputs.version }}
      skip_publish: ${{ steps.git-state.outputs.skip_publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve tag version
        id: tag
        run: |
          ref="${GITHUB_REF}"
          if ! [[ "$ref" =~ ^refs/tags/v(.+)$ ]]; then
            echo "Expected refs/tags/vX.Y.Z, got $ref"
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: v${version}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag version: $version"

      - name: Sync version files
        run: bash scripts/ci/sync-versions-from-tag.sh "${{ steps.tag.outputs.version }}"

      - name: Detect git release state
        id: git-state
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch origin master "refs/tags/v${VERSION}"
          master_sha=$(git rev-parse origin/master)
          tag_sha=$(git rev-parse "refs/tags/v${VERSION}^{commit}" 2>/dev/null || echo "")
          if [ -z "$(git status --porcelain)" ] && [ -n "$tag_sha" ] && [ "$tag_sha" = "$master_sha" ]; then
            echo "Git release aligned: tag v${VERSION} at master with synced files."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Git release needs publish (version commit and/or retag)."
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish version sync to master
        if: steps.git-state.outputs.skip_publish != 'true'
        id: publish
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          DEFAULT_BRANCH: master
        run: bash scripts/ci/publish-version-sync.sh "${VERSION}"
