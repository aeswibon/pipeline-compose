name: Release publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver without v prefix
        type: string
        required: true
      skip_publish:
        description: True when master and tag already had synced version files
        type: string
        required: false
        default: "false"
  workflow_call:
    inputs:
      version:
        description: Semver without v prefix
        type: string
        required: true
      skip_publish:
        description: True when master and tag already had synced version files
        type: string
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Render release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: bash scripts/ci/render-release-notes.sh "${VERSION}" release-notes.md

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            --verify-tag
          echo "Created GitHub release $tag"
