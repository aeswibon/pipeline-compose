name: Release publish

on:
  workflow_call:
    inputs:
      version:
        description: Semver without v prefix
        type: string
        required: true
      skip_publish:
        description: True when master and tag already had synced version files
        type: string
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
          echo "Created GitHub release $tag"

  dispatch-ci:
    name: Dispatch CI when already synced
    if: inputs.skip_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch CI on master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci.yml --ref master
          echo "Dispatched CI on master (tag already aligned; CI not triggered by master push)."
