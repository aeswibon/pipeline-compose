name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm run test:coverage

  pipeline-validate:
    name: Pipeline validate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run validate .github/pipelines/pipeline.yml --workflows --strict
      - run: >-
          pnpm run validate
          examples/run-tag-release/.github/pipelines/pipeline.yml
          --repo-root examples/run-tag-release
          --workflows
          --strict

  compile-action-parity:
    name: Compile action parity
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm --filter @aeswibon/pipeline-compose-action-compile run bundle
      - run: >-
          pnpm exec tsx packages/cli/src/main.ts compile
          .github/pipelines/pipeline.yml
          -o /tmp/cli-out.yml
          --workflow-output .github/workflows/release.yml
          --compile-action ./packages/action-compile
      - run: grep -q 'compile-check' /tmp/cli-out.yml
      - uses: ./packages/action-compile
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          output: /tmp/action-out.yml
          workflow_output: .github/workflows/release.yml
          compile_action: ./packages/action-compile
      - run: diff /tmp/cli-out.yml /tmp/action-out.yml

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run bundle:actions
      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash
          sudo mv actionlint /usr/local/bin/
      - run: pip install yamllint
      - run: bash scripts/lint-workflows.sh
