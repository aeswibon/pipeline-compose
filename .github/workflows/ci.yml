name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build

  compile-action-parity:
    name: Compile action parity
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: aeswibon/pipeline-compose-compile
          path: pipeline-compose-compile
          ref: master
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec tsx bin/pipeline-compose.ts compile
          .github/pipelines/pipeline.yml
          -o /tmp/cli-out.yml
          --workflow-output .github/workflows/pipeline.yml
          --compile-action aeswibon/pipeline-compose-compile@master
      - run: grep -q 'compile-check' /tmp/cli-out.yml
      - uses: ./pipeline-compose-compile
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          output: /tmp/action-out.yml
          workflow_output: .github/workflows/pipeline.yml
          compile_action: aeswibon/pipeline-compose-compile@master
      - run: diff /tmp/cli-out.yml /tmp/action-out.yml

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash
          sudo mv actionlint /usr/local/bin/
      - run: pip install yamllint
      - run: bash scripts/lint-workflows.sh
