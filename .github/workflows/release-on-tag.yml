name: Release on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/sync-version.yml
    secrets: inherit

  github-release:
    name: GitHub Release
    needs: sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.sync.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
          echo "Created GitHub release $tag"

  ci:
    name: Trigger CI
    needs: sync
    if: needs.sync.outputs.skip_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch CI on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci.yml --ref main
          echo "Dispatched CI on main (tag already aligned; CI not triggered by main push)."
