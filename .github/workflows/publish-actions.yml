name: Publish actions

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver without v prefix (e.g. 0.3.1)
        type: string
        required: true
      use_master:
        description: Publish from master HEAD instead of the release tag
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      version:
        description: Semver without v prefix
        type: string
        required: true
      use_master:
        description: Publish from master HEAD instead of the release tag
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  publish-actions:
    name: Publish action repositories
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout source ref
        env:
          VERSION: ${{ inputs.version }}
          USE_MASTER: ${{ inputs.use_master }}
        run: |
          if [ "$USE_MASTER" = "true" ]; then
            git checkout master
            echo "Publishing from master HEAD"
          elif git rev-parse "refs/tags/v${VERSION}^{commit}" >/dev/null 2>&1; then
            git checkout "refs/tags/v${VERSION}"
            echo "Using tag v${VERSION}"
          else
            echo "::warning::Tag v${VERSION} not found; publishing from $(git rev-parse --abbrev-ref HEAD)."
          fi

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run bundle:actions

      - name: Require publish token
        env:
          GH_TOKEN: ${{ secrets.ACTION_PUBLISH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing repository secret ACTION_PUBLISH_TOKEN."
            echo "Add a PAT with contents:write on pipeline-compose-run, -compile, -eval, and -context-merge."
            exit 1
          fi

      - name: Publish action packages
        env:
          GH_TOKEN: ${{ secrets.ACTION_PUBLISH_TOKEN }}
        run: bash scripts/publish-action-packages.sh "v${{ inputs.version }}"
