# Local-only compile smoke (act). Uses committed action bundles — no ncc rebuild.
# Not triggered on push/PR — see scripts/act-test.sh
name: Act — compile smoke

on:
  workflow_dispatch:
    inputs:
      pipeline_file:
        description: Pipeline YAML path
        required: true
        default: examples/pipeline-release.yml
      pipeline_inline:
        description: Optional inline YAML override
        required: false
        default: ''

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify bundled actions are present
        run: bash scripts/verify-bundles.sh

      - uses: ./compile
        with:
          pipeline_file: ${{ inputs.pipeline_file }}
          pipeline_inline: ${{ inputs.pipeline_inline }}
          output: examples/act-output.generated.yml

      - name: Assert generated workflow shape
        run: grep -q 'workflow_call' examples/act-output.generated.yml
