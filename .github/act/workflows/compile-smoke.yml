# Local-only compile smoke (act). See scripts/act-test.sh.
name: Act — compile smoke

on:
  workflow_dispatch:
    inputs:
      pipeline_file:
        description: Pipeline YAML path
        required: true
        default: .github/pipelines/pipeline.yml

jobs:
  compile-pipeline:
    name: Compile pipeline (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec tsx bin/pipeline-compose.ts compile
          ${{ inputs.pipeline_file }}
          -o /tmp/act-compile-out.yml
      - name: Assert generated workflow shape
        run: grep -q 'compile-check' /tmp/act-compile-out.yml
