# Local-only compile smoke (act). Uses committed bundles. See scripts/act-test.sh.
name: Act — compile smoke

on:
  workflow_dispatch:
    inputs:
      pipeline_file:
        description: Pipeline YAML path
        required: true
        default: .github/pipelines/pipeline.yml
      pipeline_inline:
        description: Optional inline YAML override
        required: false
        default: ''

jobs:
  compile-pipeline:
    name: Compile pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify bundled actions are present
        run: bash scripts/verify-bundles.sh

      - uses: ./compile
        with:
          pipeline_file: ${{ inputs.pipeline_file }}
          pipeline_inline: ${{ inputs.pipeline_inline }}
          output: /tmp/act-compile-out.yml

      - name: Assert generated workflow shape
        run: grep -q 'compile-check' /tmp/act-compile-out.yml
