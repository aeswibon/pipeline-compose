version: 2
concurrency:
  group: release-${{ github.ref }}
  cancel_in_progress: false
groups:
  release:
    description: Meta-repo tag release chain
companion_workflows:
  - .github/workflows/release.yml
  - .github/workflows/smoke-cross-repo.yml
  - .github/workflows/pipeline-pr-comment.yml
pipelines:
  release:
    group: release
    stages:
      - id: ci
        workflow: .github/workflows/ci.yml
      - id: version-sync
        workflow: .github/workflows/stage-version-sync.yml
        needs:
          - ci
        outputs:
          - version
          - skip_publish
      - id: release-publish
        workflow: .github/workflows/stage-release-publish.yml
        needs:
          - version-sync
        inputs:
          version: ${{ context.version-sync.version }}
          skip_publish: ${{ context.version-sync.skip_publish }}
      - id: publish-actions
        workflow: .github/workflows/publish-actions.yml
        needs:
          - release-publish
        inputs:
          version: ${{ context.version-sync.version }}
