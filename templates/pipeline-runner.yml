# Copy to .github/workflows/pipeline.yml in your repository.
# Requires .github/pipelines/pipeline.yml and committed pipeline.generated.yml.

name: Pipeline

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write
  actions: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile-check:
    name: Compile check
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pin @v1 after https://github.com/aeswibon/pipeline-compose/releases/tag/v1 exists
      - uses: aeswibon/pipeline-compose/compile@master
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          output: .github/workflows/pipeline.generated.yml
          check: "true"

  run-pipeline:
    name: Run pipeline
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/pipeline.generated.yml
    secrets: inherit
