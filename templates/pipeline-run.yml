# Copy to `.github/workflows/release.yml` (or add to an existing workflow).
# Requires pipeline-compose-run: https://github.com/aeswibon/pipeline-compose-run

name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aeswibon/pipeline-compose-run@master
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          github_token: ${{ github.token }}
