name: Release
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aeswibon/pipeline-compose-run@v1.0.0
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          github_token: ${{ github.token }}
          repo_tokens_json: >
            {"your-org/your-target-repo":"${{ secrets.REMOTE_DISPATCH_TOKEN }}"}
