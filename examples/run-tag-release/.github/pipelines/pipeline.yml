version: 2
groups:
  release:
    description: Tag release example chain
companion_workflows:
  - .github/workflows/release.yml
catalog:
  ci:
    workflow: .github/workflows/ci.yml
  version-sync:
    workflow: .github/workflows/stage-version-sync.yml
    outputs:
      - version
pipelines:
  release:
    group: release
    stages:
      - id: ci
        use: ci

      - id: version-sync
        use: version-sync
        needs:
          - ci

      - id: release-publish
        workflow: .github/workflows/stage-release-publish.yml
        needs:
          - version-sync
        inputs:
          version: ${{ context.version-sync.version }}
