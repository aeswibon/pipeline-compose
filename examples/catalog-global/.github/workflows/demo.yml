name: demo

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aeswibon/pipeline-compose-run@v1.13.0
        with:
          pipeline_file: .github/pipelines/pipeline.yml
          pipeline: demo
